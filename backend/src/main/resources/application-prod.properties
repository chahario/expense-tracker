# ── Production profile ───────────────────────────────────────────────────
# Active when: SPRING_PROFILES_ACTIVE=prod
#
# ALL sensitive values come from environment variables — never hardcoded.
#
# Railway PostgreSQL provides these automatically when you add a Postgres plugin:
#   DATABASE_URL  → full JDBC URL
#   DATABASE_USER / DATABASE_PASSWORD
#
# OR use individual PG* vars:
#   PGHOST, PGPORT, PGDATABASE, PGUSER, PGPASSWORD
# ─────────────────────────────────────────────────────────────────────────

spring.datasource.url=jdbc:postgresql://${PGHOST}:${PGPORT}/${PGDATABASE}
spring.datasource.username=${PGUSER}
spring.datasource.password=${PGPASSWORD}

spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

spring.flyway.enabled=true

# ── HikariCP connection pool ─────────────────────────────────────────────
# Tuned for a small-to-medium deployed app on Railway free tier.
# PG max_connections default is 100; keep well below that.
spring.datasource.hikari.pool-name=HikariPool-Prod
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.idle-timeout=300000
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.max-lifetime=1800000
# Detect dead connections early
spring.datasource.hikari.keepalive-time=60000
spring.datasource.hikari.connection-test-query=SELECT 1

# ── Logging ──────────────────────────────────────────────────────────────
logging.level.com.fenmo=INFO
logging.level.org.hibernate.SQL=WARN
logging.level.org.springframework.web=WARN
