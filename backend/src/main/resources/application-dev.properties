# ── Dev profile ──────────────────────────────────────────────────────────
# Active when: SPRING_PROFILES_ACTIVE=dev  (default when running mvn spring-boot:run)
# Matches the docker-compose.yml postgres service credentials.

spring.datasource.url=jdbc:postgresql://localhost:5432/expenses
spring.datasource.username=expense_user
spring.datasource.password=expense_pass

# HikariCP — conservative pool for local dev
spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.minimum-idle=1
spring.datasource.hikari.connection-timeout=20000
spring.datasource.hikari.pool-name=HikariPool-Dev

# Verbose SQL in dev only
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Debug logging
logging.level.com.fenmo=DEBUG
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.orm.jdbc.bind=TRACE
