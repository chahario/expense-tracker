# ── Test profile ─────────────────────────────────────────────────────────
# Used by @SpringBootTest + @ActiveProfiles("test")
# H2 in PostgreSQL compatibility mode avoids needing a real PG instance in CI.
# Trade-off: H2 doesn't perfectly emulate PG (e.g., TIMESTAMPTZ → TIMESTAMP).
# For full fidelity, use Testcontainers in a separate test profile.

spring.datasource.url=jdbc:h2:mem:testdb;MODE=PostgreSQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
# Let Hibernate create the schema from entities in tests
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true

# Disable Flyway for tests (Hibernate manages schema via create-drop)
spring.flyway.enabled=false

logging.level.com.fenmo=DEBUG
